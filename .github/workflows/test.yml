name: E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Cache test dependencies
        uses: actions/cache@v4
        with:
          path: tests/node_modules
          key: ${{ runner.os }}-tests-${{ hashFiles('tests/package-lock.json') }}

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Create backend .env
        run: |
          echo "PORT=5000" > backend/.env
          echo "MONGO_URI=mongodb://localhost:27017/mern_auth" >> backend/.env
          echo "JWT_SECRET=ci-jwt-secret-key-2026" >> backend/.env
          echo "JWT_EXPIRES_IN=7d" >> backend/.env

      - name: Start backend
        run: |
          node server.js &
          sleep 3
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:5000/api/health
        working-directory: backend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Start frontend preview
        run: |
          npx vite preview --port 5173 &
          sleep 3
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:5173
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: tests

      - name: Run Playwright tests
        run: npx playwright test login.spec.js
        working-directory: tests

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
